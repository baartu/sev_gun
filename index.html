<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Kavanoz </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <canvas id="flower-canvas"></canvas>
    <div class="container">
        <h1 class="title">Sanal Kavanoz</h1>
        <p class="subtitle">Notunu okumak için kavanoza tıkla ❤️</p>

        <div class="jar-container" id="unit-jar">
            <div class="jar">
                <div class="lid"></div>
                <div class="glass">
                    <div class="heart">❤️</div>
                    <div class="notes">
                        <!-- CSS Generated Notes inside -->
                        <span style="--i:1; --r: 10deg;">💌</span>
                        <span style="--i:2; --r: -15deg;">💌</span>
                        <span style="--i:3; --r: 5deg;">💌</span>
                        <span style="--i:4; --r: -25deg;">💌</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="message-card hidden" id="unit-message">
            <p id="message-text">...</p>
            <button class="close-btn" id="unit-close">Tamam</button>
        </div>
    </div>

    <!-- Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>

</html>
